name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Secret scanning: blocca qualunque PR che contenga secret.
  # Il full security pipeline (pip-audit, npm audit, trivy, SBOM) arriva
  # in F12-03. Qui teniamo solo il minimo indispensabile.
  # ─────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────
  # Compose validation: verifica che docker-compose sia sintatticamente
  # valido. Utile già in Sprint 1 quando non c'è ancora codice applicativo.
  # ─────────────────────────────────────────────────────────────────────
  compose-validate:
    name: docker compose smoke test (F1-02)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run compose smoke test
        # Single source of truth: lo stesso script usato da `make compose-check`.
        run: bash scripts/test-compose.sh

  postgres-smoke:
    name: postgres + pgvector smoke test (F1-03)
    runs-on: ubuntu-latest
    needs: compose-validate
    steps:
      - uses: actions/checkout@v4
      - name: Run postgres smoke test
        # Stesso script di `make postgres-check`. Boot postgres, asserta
        # extensions vector+pgcrypto, ruoli mm_*, default privileges.
        run: bash scripts/test-postgres.sh

  alembic-smoke:
    name: Alembic baseline schema smoke test (F1-04)
    runs-on: ubuntu-latest
    needs: postgres-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # psycopg3 richiede Python >= 3.11; usiamo 3.12 LTS (3.14 è target
          # container, runner host può stare sulla minor più stabile).
          python-version: '3.12'
      - name: Run Alembic smoke test
        # Stesso script di `make migrate-check`. Upgrade head, verifica
        # tabelle/indici/trigger/RLS, downgrade base, re-upgrade.
        run: bash scripts/test-alembic.sh

  redis-streams-smoke:
    name: Redis Streams smoke test (F1-05)
    runs-on: ubuntu-latest
    needs: compose-validate
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Il driver host richiede Python >= 3.11 (pydantic 2.13 + redis 5.2).
          python-version: '3.12'
      - name: Run Redis Streams smoke test
        # Stesso script di `make redis-check`. Boot redis, ensure consumer
        # groups su mm:embed_jobs/mm:distill_jobs/mm:tighten_jobs, testa
        # round-trip XADD→XREADGROUP→XACK, DLQ append, schema pydantic.
        run: bash scripts/test-redis-streams.sh

  ollama-smoke:
    name: Ollama smoke test (F1-06)
    runs-on: ubuntu-latest
    needs: compose-validate
    steps:
      - uses: actions/checkout@v4
      - name: Run Ollama smoke test
        # Stesso script di `make ollama-check`. Verifica profile opt-in,
        # boot con --profile ollama, env hardening (MAX_LOADED_MODELS=1,
        # KEEP_ALIVE=5m), ollama list, pull script syntax + dry-run.
        # NON scarica modelli veri (sarebbero ~6GB — troppo costoso su CI).
        run: bash scripts/test-ollama.sh

  # ─────────────────────────────────────────────────────────────────────
  # Placeholder: si attivano quando api/app (Python) e plugin/ (Node)
  # avranno codice. Oggi sono no-op che passano.
  # ─────────────────────────────────────────────────────────────────────
  python-lint:
    name: Python lint (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if api/app/ not yet scaffolded
        run: |
          if [ ! -d api/app ]; then
            echo "api/app/ non ancora presente — skip (atteso fino a F2-01)."
            exit 0
          fi
          echo "TODO: aggiungere ruff/mypy quando F2-01 scaffolda api/app/."

  node-lint:
    name: Node lint (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if plugin/ not yet scaffolded
        run: |
          if [ ! -d plugin/packages ]; then
            echo "plugin/packages/ non ancora presente — skip (atteso fino a F7a-01)."
            exit 0
          fi
          echo "TODO: aggiungere eslint/tsc quando F7a-01 scaffolda il monorepo."
