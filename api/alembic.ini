# MemoryMesh — Alembic configuration (F1-04)
#
# La DATABASE_URL reale viene letta in env.py da app.config.Settings (env),
# non da qui. sqlalchemy.url è intenzionalmente un placeholder.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
path_separator = os
sqlalchemy.url = driver://override-at-runtime-via-env
# Versioni nominate come 0001_slug.py per ordering stabile
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# ─── Logging ────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
